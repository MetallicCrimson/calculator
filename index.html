<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="ui-bar"></div>
        <div id="display">0</div>
        <div id="buttons">
            <div class="row">
                <div class="button button-clear">C</div>
                <div class="button button-backspace">🠔</div>
                <div class="button"></div>
                <div class="button"></div>
            </div>
            <div class="row">
                <div class="button button-7">7</div>
                <div class="button button-8">8</div>
                <div class="button button-9">9</div>
                <div class="button button-divide">/</div>
            </div>
            <div class="row">
                <div class="button button-4">4</div>
                <div class="button button-5">5</div>
                <div class="button button-6">6</div>
                <div class="button button-multiply">*</div>
            </div>
            <div class="row">
                <div class="button button-1">1</div>
                <div class="button button-2">2</div>
                <div class="button button-3">3</div>
                <div class="button button-subtract">-</div>
            </div>
            <div class="row">
                <div class="button button-0">0</div>
                <div class="button button-decimal">.</div>
                <div class="button button-equal">=</div>
                <div class="button button-add">+</div>
            </div>
        </div>
    </div>

    <div class="footer">
        Copyright &nbsp;© &nbsp;MetallicCrimson 2026
    </div>
</body>
</html>
