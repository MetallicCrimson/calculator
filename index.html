<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="ui-bar">
            <div class="ui-button button-help">Help</div>
            <div class="ui-button button-about">About</div>
            <div class="ui-button button-expand">Expand</div>

            <div class="ui-help ui-hidden"><div>
                <h3>Calculator by MetallicCrimson</h2>
                <p>This is help</p>    
            </div></div>
            <div class="ui-about ui-hidden"><div>
                <h3>Calculator by MetallicCrimson</h2>
                <p>This is about</p>  
            </div></div>
        </div>
        <div id="display">0</div>
        <div class="buttons" id="buttons-basic">
            <div class="row">
                <div class="button button-clear">C</div>
                <div class="button button-backspace">🠔</div>
                <div class="button button-sqrt">√‾</div>
                <div class="button button-sign">±</div>
            </div>
            <div class="row">
                <div class="button button-digit">7</div>
                <div class="button button-digit">8</div>
                <div class="button button-digit">9</div>
                <div class="button button-operator">/</div>
            </div>
            <div class="row">
                <div class="button button-digit">4</div>
                <div class="button button-digit">5</div>
                <div class="button button-digit">6</div>
                <div class="button button-operator">*</div>
            </div>
            <div class="row">
                <div class="button button-digit">1</div>
                <div class="button button-digit">2</div>
                <div class="button button-digit">3</div>
                <div class="button button-operator">-</div>
            </div>
            <div class="row">
                <div class="button button-digit">0</div>
                <div class="button button-decimal">.</div>
                <div class="button button-equal">=</div>
                <div class="button button-operator">+</div>
            </div>
        </div>
        <div class="buttons ui-hidden" id="buttons-expanded">
            <div class="top-row">
                <div class="button button-clear">C</div>
                <div class="button button-backspace">🠔</div>
                <div class="button button-operator">+</div>
                <div class="button button-operator">-</div>
                <div class="button button-operator">*</div>
                <div class="button button-operator">/</div>
                <div class="button button-equal">=</div>
            </div>
            <div class="digit-row"></div>
        </div>
    </div>

    <div class="footer">
        Copyright &nbsp;© &nbsp;MetallicCrimson 2026
    </div>
</body>
</html>
